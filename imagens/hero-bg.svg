<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#020614"/>
      <stop offset="60%"  stop-color="#070b30"/>
      <stop offset="100%" stop-color="#0b1248"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c1240"/>
      <stop offset="100%" stop-color="#020614"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#111a60"/>
      <stop offset="100%" stop-color="#04061a"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a2575"/>
      <stop offset="100%" stop-color="#0d1450"/>
    </linearGradient>
    <linearGradient id="holds" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0f1858"/>
      <stop offset="100%" stop-color="#080d38"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="72%" cy="62%" r="35%">
      <stop offset="0%"   stop-color="#057347" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#057347" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowNav" cx="79%" cy="42%" r="10%">
      <stop offset="0%"   stop-color="#00ff99" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#00ff99" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBridge" cx="79%" cy="50%" r="12%">
      <stop offset="0%"   stop-color="#7ec7ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7ec7ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ── SKY ── -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Atmospheric glow layers -->
  <rect width="1920" height="1080" fill="url(#glowGreen)"/>
  <rect width="1920" height="1080" fill="url(#glowBridge)"/>
  <rect width="1920" height="1080" fill="url(#glowNav)"/>

  <!-- Subtle stars -->
  <g fill="#ffffff">
    <circle cx="120"  cy="60"  r="1" opacity="0.5"/>
    <circle cx="310"  cy="42"  r="1.2" opacity="0.4"/>
    <circle cx="540"  cy="88"  r="0.8" opacity="0.5"/>
    <circle cx="780"  cy="30"  r="1" opacity="0.35"/>
    <circle cx="940"  cy="70"  r="1.2" opacity="0.4"/>
    <circle cx="1060" cy="44"  r="0.8" opacity="0.5"/>
    <circle cx="200"  cy="150" r="1" opacity="0.3"/>
    <circle cx="450"  cy="130" r="0.8" opacity="0.35"/>
    <circle cx="640"  cy="170" r="1" opacity="0.3"/>
    <circle cx="820"  cy="110" r="1.2" opacity="0.25"/>
    <circle cx="1000" cy="160" r="0.8" opacity="0.3"/>
    <circle cx="80"   cy="200" r="0.8" opacity="0.25"/>
    <circle cx="380"  cy="240" r="1" opacity="0.2"/>
    <circle cx="560"  cy="210" r="0.8" opacity="0.25"/>
  </g>

  <!-- ── SEA ── -->
  <rect x="0" y="690" width="1920" height="390" fill="url(#sea)"/>

  <!-- Horizon glow -->
  <rect x="0" y="682" width="1920" height="20" fill="#0e1860" opacity="0.5" filter="url(#softer)"/>

  <!-- Water lines / ripples -->
  <g fill="#2040a0" opacity="0.07">
    <rect x="0"   y="705" width="1920" height="2"/>
    <rect x="80"  y="722" width="1840" height="1"/>
    <rect x="0"   y="738" width="1920" height="2"/>
    <rect x="200" y="754" width="1620" height="1"/>
    <rect x="0"   y="770" width="1920" height="2"/>
    <rect x="50"  y="786" width="1870" height="1"/>
    <rect x="0"   y="802" width="1920" height="2"/>
    <rect x="150" y="818" width="1770" height="1"/>
    <rect x="0"   y="834" width="1920" height="2"/>
  </g>

  <!-- ══════════════════════════════════════
       CARGO SHIP SILHOUETTE
       Bow at x≈140, Bridge at x≈1350-1700
       Waterline at y=690
  ══════════════════════════════════════ -->

  <!-- Shadow under hull (reflection softened) -->
  <path d="M 200,720 L 200,740 Q 960,760 1760,740 L 1760,720 Q 960,710 200,720Z"
        fill="#000820" opacity="0.35" filter="url(#softer)"/>

  <!-- HULL -->
  <path d="
    M 140,690
    L 200,670
    L 220,658
    L 1720,658
    L 1780,670
    L 1800,690
    L 1800,725
    L 1790,732
    L 210,732
    L 190,725
    Z"
    fill="url(#hull)" opacity="0.92"/>

  <!-- Green waterline stripe -->
  <rect x="195" y="703" width="1600" height="14" fill="#057347" opacity="0.55"/>
  <!-- Lighter edge on stripe -->
  <rect x="195" y="703" width="1600" height="3" fill="#0a9a5e" opacity="0.4"/>

  <!-- Deck surface -->
  <rect x="220" y="652" width="1500" height="8" fill="#18226a" opacity="0.95"/>
  <!-- Deck railing line -->
  <rect x="220" y="648" width="1500" height="3" fill="#222e82" opacity="0.6"/>

  <!-- ── CARGO HOLDS (5 units) ── -->
  <!-- Hold covers: rounded top, slight sheen -->
  <!-- Hold 1 -->
  <rect x="250" y="576" width="190" height="74" fill="url(#holds)" opacity="0.92" rx="2"/>
  <rect x="250" y="576" width="190" height="6"  fill="#1c2870" opacity="0.8"/>
  <rect x="252" y="578" width="186" height="2"  fill="#283890" opacity="0.4"/>
  <!-- Hold 2 -->
  <rect x="460" y="576" width="190" height="74" fill="url(#holds)" opacity="0.92" rx="2"/>
  <rect x="460" y="576" width="190" height="6"  fill="#1c2870" opacity="0.8"/>
  <rect x="462" y="578" width="186" height="2"  fill="#283890" opacity="0.4"/>
  <!-- Hold 3 -->
  <rect x="670" y="576" width="190" height="74" fill="url(#holds)" opacity="0.92" rx="2"/>
  <rect x="670" y="576" width="190" height="6"  fill="#1c2870" opacity="0.8"/>
  <rect x="672" y="578" width="186" height="2"  fill="#283890" opacity="0.4"/>
  <!-- Hold 4 -->
  <rect x="880" y="576" width="190" height="74" fill="url(#holds)" opacity="0.92" rx="2"/>
  <rect x="880" y="576" width="190" height="6"  fill="#1c2870" opacity="0.8"/>
  <rect x="882" y="578" width="186" height="2"  fill="#283890" opacity="0.4"/>
  <!-- Hold 5 -->
  <rect x="1090" y="576" width="190" height="74" fill="url(#holds)" opacity="0.92" rx="2"/>
  <rect x="1090" y="576" width="190" height="6"  fill="#1c2870" opacity="0.8"/>
  <rect x="1092" y="578" width="186" height="2"  fill="#283890" opacity="0.4"/>

  <!-- Deck equipment / walkways between holds -->
  <g fill="#1a2470" opacity="0.5">
    <rect x="442" y="600" width="16" height="52"/>
    <rect x="652" y="600" width="16" height="52"/>
    <rect x="862" y="600" width="16" height="52"/>
    <rect x="1072" y="600" width="16" height="52"/>
    <rect x="1282" y="590" width="16" height="62"/>
  </g>

  <!-- BOW mast / crane -->
  <rect x="295" y="498" width="6" height="154" fill="#1a2470" opacity="0.8"/>
  <rect x="255" y="530" width="86" height="3"  fill="#1a2470" opacity="0.6"/>
  <!-- Bow cable lines -->
  <line x1="298" y1="505" x2="250" y2="560" stroke="#151e5a" stroke-width="1.5" opacity="0.45"/>
  <line x1="298" y1="505" x2="346" y2="560" stroke="#151e5a" stroke-width="1.5" opacity="0.45"/>

  <!-- ── FUNNEL / CHIMNEY ── -->
  <rect x="1268" y="494" width="42" height="110" fill="#0e1540" opacity="0.9" rx="1"/>
  <rect x="1265" y="488" width="48" height="10" fill="#0c1238" opacity="0.9"/>
  <!-- Funnel top rings -->
  <rect x="1265" y="488" width="48" height="4" fill="#057347" opacity="0.65"/>
  <rect x="1265" y="494" width="48" height="3" fill="#11145f" opacity="0.5"/>
  <!-- Funnel exhaust hint -->
  <ellipse cx="1289" cy="487" rx="18" ry="8" fill="#0d1030" opacity="0.4" filter="url(#softer)"/>

  <!-- ── BRIDGE / SUPERSTRUCTURE ── -->
  <!-- Lower deck -->
  <rect x="1320" y="560" width="400" height="92" fill="url(#bridge)" opacity="0.95" rx="1"/>
  <!-- Mid level -->
  <rect x="1350" y="490" width="350" height="72" fill="#1c2878" opacity="0.95" rx="1"/>
  <!-- Upper bridge -->
  <rect x="1380" y="440" width="290" height="52" fill="#20307e" opacity="0.95" rx="1"/>
  <!-- Roof/wing bridge -->
  <rect x="1360" y="430" width="330" height="12" fill="#242e82" opacity="0.9"/>
  <!-- Top nav deck -->
  <rect x="1400" y="410" width="220" height="22" fill="#262e88" opacity="0.9"/>

  <!-- Bridge windows – main row (lit) -->
  <g fill="#7ec7ff" opacity="0.45">
    <rect x="1370" y="504" width="24" height="16" rx="1"/>
    <rect x="1402" y="504" width="24" height="16" rx="1"/>
    <rect x="1434" y="504" width="24" height="16" rx="1"/>
    <rect x="1466" y="504" width="24" height="16" rx="1"/>
    <rect x="1498" y="504" width="24" height="16" rx="1"/>
    <rect x="1530" y="504" width="24" height="16" rx="1"/>
    <rect x="1562" y="504" width="24" height="16" rx="1"/>
    <rect x="1594" y="504" width="24" height="16" rx="1"/>
    <rect x="1626" y="504" width="24" height="16" rx="1"/>
    <rect x="1658" y="504" width="24" height="16" rx="1"/>
  </g>
  <!-- Window glow bloom -->
  <g fill="#7ec7ff" opacity="0.08" filter="url(#soft)">
    <rect x="1360" y="498" width="340" height="30"/>
  </g>
  <!-- Lower windows (dimmer) -->
  <g fill="#7ec7ff" opacity="0.22">
    <rect x="1340" y="578" width="20" height="14" rx="1"/>
    <rect x="1368" y="578" width="20" height="14" rx="1"/>
    <rect x="1396" y="578" width="20" height="14" rx="1"/>
    <rect x="1424" y="578" width="20" height="14" rx="1"/>
    <rect x="1452" y="578" width="20" height="14" rx="1"/>
    <rect x="1480" y="578" width="20" height="14" rx="1"/>
    <rect x="1508" y="578" width="20" height="14" rx="1"/>
    <rect x="1536" y="578" width="20" height="14" rx="1"/>
    <rect x="1564" y="578" width="20" height="14" rx="1"/>
    <rect x="1592" y="578" width="20" height="14" rx="1"/>
    <rect x="1620" y="578" width="20" height="14" rx="1"/>
    <rect x="1648" y="578" width="20" height="14" rx="1"/>
    <rect x="1676" y="578" width="20" height="14" rx="1"/>
    <rect x="1704" y="578" width="20" height="14" rx="1"/>
  </g>

  <!-- ── MAIN MAST ── -->
  <rect x="1500" y="292" width="7" height="120" fill="#1c2672" opacity="0.9"/>
  <!-- Mast crossarm -->
  <rect x="1456" y="316" width="95" height="4" fill="#1c2672" opacity="0.9"/>
  <!-- Signal stays/wires -->
  <line x1="1503" y1="300" x2="1456" y2="355" stroke="#141e60" stroke-width="1.5" opacity="0.5"/>
  <line x1="1503" y1="300" x2="1551" y2="355" stroke="#141e60" stroke-width="1.5" opacity="0.5"/>

  <!-- Navigation light – starboard GREEN -->
  <circle cx="1551" cy="318" r="6"  fill="#00ff88" opacity="0.80"/>
  <circle cx="1551" cy="318" r="14" fill="#00ff88" opacity="0.18" filter="url(#soft)"/>
  <circle cx="1551" cy="318" r="22" fill="#00ff88" opacity="0.07" filter="url(#softer)"/>

  <!-- Masthead white light -->
  <circle cx="1503" cy="295" r="4"  fill="#ffffff" opacity="0.75"/>
  <circle cx="1503" cy="295" r="10" fill="#ffffff" opacity="0.15" filter="url(#soft)"/>

  <!-- ── HORIZON & WATERLINE GLOW ── -->
  <rect x="0" y="687" width="1920" height="5" fill="#057347" opacity="0.20"/>
  <rect x="0" y="686" width="1920" height="8" fill="#0a1860" opacity="0.30" filter="url(#softer)"/>

  <!-- ── SUBTLE NAUTICAL GRID (barely visible) ── -->
  <g stroke="#3050b0" stroke-width="0.6" opacity="0.035" fill="none">
    <line x1="0" y1="180" x2="1920" y2="180"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="384" y1="0"  x2="384"  y2="690"/>
    <line x1="768" y1="0"  x2="768"  y2="690"/>
    <line x1="1152" y1="0" x2="1152" y2="690"/>
    <line x1="1536" y1="0" x2="1536" y2="690"/>
  </g>

</svg>
